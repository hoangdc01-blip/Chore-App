jit_hint:
  cho: >
    Bottleneck is Firestore security rules - they are effectively open.
    Secondary bottleneck is the absence of React error boundaries.
  chat: >
    The optimistic update pattern is pragmatic for a family app but
    lacks rollback. Not over-engineered - appropriate for scope.
  luong: >
    Fix priority: (1) Error boundary wrapper (low effort, high impact),
    (2) Firestore rules tightening, (3) PIN salting. Stats performance
    can be deferred.
  luc: >
    Error boundary is immediate (30 min fix). Firestore rules need
    design discussion (single-family vs multi-family). PIN hardening
    can be deferred since UI lockout provides partial protection.
